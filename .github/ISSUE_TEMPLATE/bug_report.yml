name: Bug report
description: Laporkan bug dengan konteks yang cukup agar Copilot dan reviewer bisa mengeksekusi perbaikan dengan jelas.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area terdampak
      options:
        - frontend
        - backend
        - both
        - infrastructure
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Ringkasan masalah
      description: Jelaskan bug dalam 1-3 kalimat.
      placeholder: Saat user melakukan ..., sistem menampilkan ...
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Perilaku saat ini
      description: Jelaskan perilaku aktual yang terjadi.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Perilaku yang diharapkan
      description: Jelaskan hasil yang seharusnya terjadi.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Langkah reproduksi
      description: Tulis langkah yang dapat direproduksi reviewer dan agent.
      placeholder: |
        1. Login sebagai ...
        2. Buka halaman ...
        3. Klik ...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Checklist hasil akhir yang harus terpenuhi.
      placeholder: |
        - Bug tidak muncul lagi
        - Tidak merusak flow lain
        - Validasi/build tetap lolos
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Log, screenshot, atau konteks tambahan
      description: Sertakan error message, response API, stack trace, atau screenshot bila ada.
