name: Feature request
description: Ajukan fitur baru dengan requirement yang cukup agar implementasi dan review lebih terarah.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area implementasi
      options:
        - frontend
        - backend
        - both
        - infrastructure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Masalah yang ingin diselesaikan
      description: Jelaskan pain point atau kebutuhan bisnisnya.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Solusi yang diinginkan
      description: Jelaskan perilaku sistem yang diharapkan setelah fitur dibuat.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope in / out
      description: Tulis apa yang termasuk dan tidak termasuk dalam task ini.
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Checklist hasil yang harus dipenuhi sebelum PR dianggap selesai.
      placeholder: |
        - User dapat ...
        - Data tervalidasi ...
        - UI menampilkan ...
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Mockup, API contract, atau referensi tambahan
      description: Tambahkan screenshot, link desain, endpoint, atau catatan teknis bila ada.
